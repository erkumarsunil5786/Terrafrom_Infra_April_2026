name: Terraform Infra Deployment By Github action
run-name: ${{ github.actor }}
on:
  workflow_dispatch: 
permissions:
   id-token: write
   contents: read
jobs:
  terraform:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout  
        uses: actions/checkout@v6
        
      - name: HashiCorp-Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.3
  azlogin:
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          
       - name: Terraform Init
         run: terraform init 
    
      - name: Terraform Fmt
        run: terraform fmt
        
      - name: Terraform Plan 
        run: terrafrom plan
    
      - name: Terraform Apply 
        run: terraform apply
      
    
    
